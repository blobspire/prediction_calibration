inputs:
  predictions_path: data/artifacts/walkforward/predictions.parquet
  panel_path: data/processed/modeling_panel.parquet
  aggregate_metrics_path: data/artifacts/walkforward/aggregate_metrics.parquet
  fold_metrics_path: data/artifacts/walkforward/fold_metrics.parquet

outputs:
  artifact_dir: data/artifacts/inference

columns:
  row_id_column: row_id
  contract_column: contract_id
  horizon_column: horizon_name
  cluster_column: event_family_id
  outcome_column: observed_outcome
  raw_probability_column: raw_probability
  predicted_probability_column: predicted_probability

inference:
  baseline_model: raw
  comparison_models: [platt, beta, isotonic]
  bootstrap_unit: event_family_id
  bootstrap_iterations: 1000
  confidence_level: 0.95
  random_seed: 20260507
  min_rows: 50
  min_clusters: 20
  fdr_alpha: 0.10
  log_loss_epsilon: 0.000001
  reliability_bin_count: 10
  reliability_min_bin_count: 30
  calibration_min_rows: 50
  calibration_max_iterations: 50
  calibration_tolerance: 0.00000001
  groupings:
    - name: overall
      columns: []
    - name: horizon
      columns: [horizon_name]
    - name: domain
      columns: [domain]
    - name: category
      columns: [category]
    - name: liquidity
      columns: [liquidity_bucket]
    - name: staleness
      columns: [staleness_bucket]
  calibration_groupings:
    - name: overall
      columns: []
    - name: horizon
      columns: [horizon_name]
  buckets:
    liquidity_bucket:
      column: public_liquidity_proxy
      edges: [2.0, 5.0]
      labels:
        - liquidity_lt_2_log_volume
        - liquidity_2_to_5_log_volume
        - liquidity_gte_5_log_volume
    staleness_bucket:
      column: price_staleness_seconds
      edges: [3600.0, 21600.0, 86400.0, 604800.0]
      labels:
        - stale_lt_1h
        - stale_1h_to_6h
        - stale_6h_to_1d
        - stale_1d_to_7d
        - stale_gte_7d
