inputs:
  raw_baseline_artifact_dir: data/artifacts/raw_baseline
  walkforward_artifact_dir: data/artifacts/walkforward
  edge_artifact_dir: data/artifacts/edge_sim
  inference_artifact_dir: data/artifacts/inference

outputs:
  figure_dir: paper/figures
  table_dir: paper/tables

reporting:
  artifact_run_label: full
  horizon_order: [30d, 14d, 7d, 3d, 1d, 6h, 1h, 15m, close]
  model_order: [raw, platt, beta, isotonic]
  metric_scope: pooled_equal_contract
  aggregation_mode: equal_contract
  reliability_bin_count: 10
  reliability_min_bin_count: 30
  figure_formats: [png, svg, pdf]
  dpi: 300
  table_formats: [csv, markdown, latex]
