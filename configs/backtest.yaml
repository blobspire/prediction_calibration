inputs:
  predictions_path: data/artifacts/walkforward/predictions.parquet
  panel_path: data/processed/modeling_panel.parquet
  quote_observations_path: data/interim/kalshi/quote_observations.parquet

outputs:
  artifact_dir: data/artifacts/edge_sim

columns:
  row_id_column: row_id
  entry_price_column: raw_probability
  predicted_probability_column: predicted_probability
  outcome_column: observed_outcome
  forecast_column: forecast_ts
  resolution_column: resolution_ts
  model_column: model_name
  fold_column: fold_id
  contract_column: contract_id
  horizon_column: horizon_name
  event_family_column: event_family_id
  staleness_column: price_staleness_seconds
  liquidity_column: public_liquidity_proxy
  cumulative_volume_column: cumulative_volume_to_forecast

screen:
  execution_mode: transaction_proxy
  trade_side: yes_only
  allow_synthetic_no: false
  min_net_edge: 0.02
  limit_rows:

quote:
  max_staleness_seconds:
  min_entry_price: 0.01
  max_entry_price: 0.99

fee:
  formula: kalshi_proxy
  fee_rate: 0.07
  schedule:
    - id: kalshi_proxy_default
      start_date: "1900-01-01"
      end_date:
      formula: kalshi_proxy
      fee_rate: 0.07
      source_status: proxy_assumption
      source_note: "Configurable fee proxy; not a documented historical exchange billing audit."

capacity:
  assumed_contracts: 1.0
  source: fixed_config_assumption_no_order_book_depth

capital_lockup:
  enabled: true
  annual_rate: 0.05
  day_count: 365.25

filters:
  max_staleness_seconds:
  min_liquidity_proxy:
  min_cumulative_volume:

tiers:
  - name: fee_only
    spread_cost: 0.0
    slippage_cost: 0.0
  - name: fee_spread
    spread_cost: 0.005
    slippage_cost: 0.0
  - name: fee_spread_slippage
    spread_cost: 0.005
    slippage_cost: 0.005
